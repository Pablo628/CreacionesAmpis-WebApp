<header class="navbar" [class.scrolled]="scrolled()">
  <div class="navbar-inner">

    <!-- Logo -->
    <a routerLink="/" class="brand">Creaciones Ampis</a>

    <!-- Links de navegación -->
    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
      <a routerLink="/catalogo" routerLinkActive="active">Catálogo</a>
      <a routerLink="/guia-tallas" routerLinkActive="active">Guía de Tallas</a>
      <a routerLink="/nosotros" routerLinkActive="active">Nosotros</a>
    </nav>

    <!-- Acciones -->
    <div class="nav-actions">

      <button class="icon-btn" aria-label="Favoritos">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                   a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78
                   1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>

      <button class="icon-btn" aria-label="Carrito">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </button>

      <button class="icon-btn" aria-label="Mi cuenta">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>

      <a routerLink="/ingresar" class="btn btn-outline">Ingresar</a>
      <a routerLink="/registrarse" class="btn btn-primary">Registrarse</a>

    </div>
  </div>
</header>

<section class="login-page">
  <!-- Lado izquierdo: imagen -->
  <div class="login-left">
    <img src="foto.jpg" alt="Creaciones Ampis" />
    <div class="login-left-overlay">
      <p class="overlay-quote">"Elegancia que te hace sentir única"</p>
    </div>
  </div>

  <!-- Lado derecho: formulario -->
  <div class="login-right">
    <div class="login-card">
      <a routerLink="/" class="login-brand">Creaciones Ampis</a>

      <h2>Bienvenida de vuelta</h2>
      <p class="login-sub">Ingresa a tu cuenta para continuar</p>

      <form
        class="login-form"
        (submit)="$event.preventDefault(); onSubmit(emailInput.value, passwordInput.value)"
      >
        <!-- Email -->
        <div class="field">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <svg
              class="field-icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
            <input
              #emailInput
              id="email"
              type="email"
              placeholder="tucorreo@ejemplo.com"
              autocomplete="email"
              [class.input-error]="loginError()"
            />
          </div>
        </div>

        <!-- Contraseña -->
        <div class="field">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <svg
              class="field-icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input
              #passwordInput
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              autocomplete="current-password"
              [class.input-error]="loginError()"
            />
            <button
              type="button"
              class="toggle-pass"
              (click)="togglePassword()"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Ver contraseña'"
            >
              @if (showPassword()) {
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                  />
                  <path
                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              } @else {
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              }
            </button>
          </div>
          <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Error -->
        @if (loginError()) {
          <p class="login-error">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            Correo o contraseña incorrectos.
          </p>
        }

        <button type="submit" class="btn-ingresar">Ingresar</button>
      </form>

      <p class="register-link">
        ¿No tienes cuenta? <a routerLink="/registrarse">Regístrate aquí</a>
      </p>
    </div>
  </div>
</section>
